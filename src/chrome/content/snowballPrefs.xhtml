<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://zotero-platform/content/zotero.css" type="text/css"?>
<?xml-stylesheet href="chrome://snowball-sources/content/snowballPrefs.css" type="text/css"?>
<window
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  title="Snowball Sources Preferences"
  width="600"
  height="720"
  onload="SnowballPrefs.onLoad(window.arguments[0])">

  <script src="chrome://snowball-sources/content/modules/log.js"/>
  <script src="chrome://snowball-sources/content/modules/errors.js"/>
  <script src="chrome://snowball-sources/content/snowballPrefs.js"/>

  <vbox flex="1" class="snowball-prefs">
    <html:section>
      <html:h2>API Keys</html:h2>
      <html:p class="hint">
        Optional. OpenAlex works without a key but recommends one for sustained use;
        a Semantic Scholar key unlocks higher rate limits and (in future) abstract
        enrichment for candidates that don't have one from OpenAlex.
      </html:p>

      <html:label class="row">
        <html:span class="label">OpenAlex API key</html:span>
        <html:input id="pref-openAlexAPIKey" type="text" placeholder="(none)"/>
      </html:label>

      <html:label class="row">
        <html:span class="label">Semantic Scholar API key</html:span>
        <html:input id="pref-semanticScholarAPIKey" type="text" placeholder="(none)"/>
      </html:label>
    </html:section>

    <html:section>
      <html:h2>Search scope</html:h2>

      <html:label class="row inline">
        <html:input id="pref-includeBackward" type="checkbox"/>
        <html:span>Include backward references (works the seeds cite)</html:span>
      </html:label>

      <html:label class="row inline">
        <html:input id="pref-includeForward" type="checkbox"/>
        <html:span>Include forward citations (works that cite the seeds)</html:span>
      </html:label>

      <html:label class="row inline">
        <html:input id="pref-skipAlreadyInLibrary" type="checkbox"/>
        <html:span>Uncheck candidates already in your library by default</html:span>
      </html:label>
    </html:section>

    <html:section>
      <html:h2>Limits</html:h2>

      <html:label class="row">
        <html:span class="label">Max seeds per run</html:span>
        <html:input id="pref-maxSeeds" type="number" min="1" max="500"/>
      </html:label>

      <html:label class="row">
        <html:span class="label">Max backward references per seed</html:span>
        <html:input id="pref-maxBackwardPerSeed" type="number" min="0" max="1000"/>
      </html:label>

      <html:label class="row">
        <html:span class="label">Max forward citations per seed</html:span>
        <html:input id="pref-maxForwardPerSeed" type="number" min="0" max="1000"/>
      </html:label>

      <html:label class="row">
        <html:span class="label">Max total candidates</html:span>
        <html:input id="pref-maxCandidatesTotal" type="number" min="1" max="10000"/>
      </html:label>

      <html:label class="row">
        <html:span class="label">Default min cited-by count</html:span>
        <html:input id="pref-minCitedBy" type="number" min="0" max="100000"/>
      </html:label>
    </html:section>

    <html:section>
      <html:h2>Score weights</html:h2>
      <html:p class="hint">
        Each signal contributes to a candidate's relevance score. Increase a
        weight to make that signal matter more. Range 0.00–2.00; defaults
        shown in parentheses are tuned for the typical "follow a research
        thread" use case.
      </html:p>

      <html:div id="snowball-weight-controls" class="snowball-weights"/>

      <html:div class="row" style="justify-content: flex-end">
        <html:button type="button" id="snowball-weights-reset"
                     onclick="SnowballPrefs.resetWeights()">Reset to defaults</html:button>
      </html:div>
    </html:section>

    <html:div id="snowball-prefs-confirm" class="snowball-prefs-confirm" hidden="hidden" role="alert">
      <html:div class="snowball-prefs-confirm-message">
        <html:strong>Some values were adjusted before saving.</html:strong>
        <html:ul id="snowball-prefs-confirm-details" class="snowball-prefs-confirm-details"/>
      </html:div>
    </html:div>

    <hbox align="center" class="snowball-prefs-footer">
      <spacer flex="1"/>
      <button id="snowball-prefs-cancel" label="Cancel" oncommand="window.close()"/>
      <button id="snowball-prefs-save" label="Save" class="primary"
              oncommand="SnowballPrefs.save()"/>
      <button id="snowball-prefs-save-anyway" label="Save anyway" class="primary"
              hidden="hidden" oncommand="SnowballPrefs.saveConfirmed()"/>
    </hbox>
  </vbox>
</window>
